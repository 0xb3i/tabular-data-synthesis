# Abalone Dataset - Regression Task
# Predict the age of abalone from physical measurements

parent_dir = "src/tabsynth/exp/abalone/check"
real_data_path = "src/tabsynth/data/abalone/"
num_numerical_features = 7
model_type = "mlp"
seed = 0
device = "cpu"

[model_params]
num_classes = 0  # 0 for regression
is_y_cond = false

[model_params.rtdl_params]
d_layers = [256, 256]
dropout = 0.0

[diffusion_params]
num_timesteps = 1000
gaussian_loss_type = "mse"
scheduler = "cosine"

[train.main]
steps = 1000
lr = 0.001
weight_decay = 1e-05
batch_size = 1024

[train.T]
seed = 0
normalization = "quantile"
num_nan_policy = "__none__"
cat_nan_policy = "__none__"
cat_min_frequency = "__none__"
cat_encoding = "__none__"
y_policy = "default"

[tabular_processor]
type = "identity"

[sample]
num_samples = 2672  # same as train size
batch_size = 1024
seed = 0

[eval.type]
eval_model = "catboost"
eval_type = "synthetic"

[eval.T]
seed = 0
normalization = "__none__"
num_nan_policy = "__none__"
cat_nan_policy = "__none__"
cat_min_frequency = "__none__"
cat_encoding = "__none__"
y_policy = "default"
